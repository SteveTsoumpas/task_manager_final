<div class="p-6 max-w-2xl mx-auto">
  <button
    (click)="cancel()"
    class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-800 mb-5 transition-colors"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    Επιστροφή
  </button>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100">
      <h4 class="text-lg font-bold text-gray-900">
        {{ isEdit ? 'Επεξεργασία Task' : 'Νέο Task' }}
      </h4>
    </div>

    <div class="px-6 py-5">
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <!-- Title -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            Τίτλος <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            formControlName="title"
            placeholder="π.χ. IT Equipment Setup"
            class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
            [class.border-red-400]="submitted && f['title'].errors"
            [class.border-gray-200]="!(submitted && f['title'].errors)"
          />
          <div *ngIf="submitted && f['title'].errors" class="mt-1 text-xs text-red-500">
            <span *ngIf="f['title'].errors?.['required']">Ο τίτλος είναι υποχρεωτικός.</span>
            <span *ngIf="f['title'].errors?.['minlength']">Τουλάχιστον 3 χαρακτήρες.</span>
          </div>
        </div>

        <!-- Description -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">
            Περιγραφή <span class="text-red-500">*</span>
          </label>
          <textarea
            formControlName="description"
            rows="3"
            placeholder="Σύντομη περιγραφή του task..."
            class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors resize-none"
            [class.border-red-400]="submitted && f['description'].errors"
            [class.border-gray-200]="!(submitted && f['description'].errors)"
          ></textarea>
          <div *ngIf="submitted && f['description'].errors" class="mt-1 text-xs text-red-500">
            <span *ngIf="f['description'].errors?.['required']"
              >Η περιγραφή είναι υποχρεωτική.</span
            >
            <span *ngIf="f['description'].errors?.['minlength']">Τουλάχιστον 10 χαρακτήρες.</span>
          </div>
        </div>

        <!-- Due date + Assignee -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              Προθεσμία <span class="text-red-500">*</span>
            </label>
            <input
              type="date"
              formControlName="dueDate"
              class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
              [class.border-red-400]="submitted && f['dueDate'].errors"
              [class.border-gray-200]="!(submitted && f['dueDate'].errors)"
            />
            <div *ngIf="submitted && f['dueDate'].errors" class="mt-1 text-xs text-red-500">
              Η προθεσμία είναι υποχρεωτική.
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">
              Υπάλληλος <span class="text-red-500">*</span>
            </label>
            <select
              formControlName="assignee"
              class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
              [class.border-red-400]="submitted && f['assignee'].errors"
              [class.border-gray-200]="!(submitted && f['assignee'].errors)"
            >
              <option value="">-- Επιλογή --</option>
              <option *ngFor="let a of assignees" [value]="a">{{ a }}</option>
            </select>
            <div *ngIf="submitted && f['assignee'].errors" class="mt-1 text-xs text-red-500">
              Επιλέξτε υπάλληλο.
            </div>
          </div>
        </div>

        <!-- Priority + Status -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Προτεραιότητα</label>
            <select
              formControlName="priority"
              class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="low">Χαμηλή</option>
              <option value="medium">Μεσαία</option>
              <option value="high">Υψηλή</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Κατάσταση</label>
            <select
              formControlName="status"
              class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="pending">Εκκρεμεί</option>
              <option value="in-progress">Σε εξέλιξη</option>
              <option value="completed">Ολοκληρώθηκε</option>
            </select>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3">
          <button
            type="button"
            (click)="cancel()"
            class="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors"
          >
            Ακύρωση
          </button>
          <button
            type="submit"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors"
          >
            {{ isEdit ? 'Αποθήκευση' : 'Δημιουργία' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
